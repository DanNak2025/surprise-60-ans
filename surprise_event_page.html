                          </a>
                        </div>
                      </div>

                      <div className="p-3.5 rounded-2xl bg-[#FFFDF9] border border-orange-100/60 shadow-sm">
                        <div className="text-xs font-bold text-orange-600 uppercase tracking-wide mb-1">
                          ⛺ Le Campement / Campsite
                        </div>
                        <h4 className="font-extrabold text-sm text-slate-800">
                          Camp Sahara Glamping
                        </h4>
                        <p className="text-xs text-slate-500 mb-3">Kalia Beach area, Dead Sea</p>
                        <div className="flex gap-2">
                          <a 
                            href="https://waze.com/ul?q=קמפ+סהרה+ים+המלח"
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="flex-1 text-center bg-sky-50 text-sky-700 text-xs font-bold py-2 rounded-xl border border-sky-100 hover:bg-sky-100 transition-all"
                          >
                            🚙 Waze
                          </a>
                          <a 
                            href="https://maps.google.com/?q=Camp+Sahara+Dead+Sea"
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="flex-1 text-center bg-orange-50 text-orange-700 text-xs font-bold py-2 rounded-xl border border-orange-100 hover:bg-orange-100 transition-all"
                          >
                            🗺️ Maps
                          </a>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="bg-white rounded-3xl p-6 shadow-xl border border-orange-50">
                    <div className="flex items-center justify-between mb-2">
                      <h3 className="text-lg font-extrabold text-amber-950">
                        {TRANSLATIONS[lang].packing_title}
                      </h3>
                      <span className="text-xs font-bold bg-orange-100 text-orange-800 px-2 py-1 rounded-full">
                        {packedCount}/{checklist.length}
                      </span>
                    </div>
                    <p className="text-xs text-amber-900/60 mb-4">{TRANSLATIONS[lang].packing_subtitle}</p>

                    <div className="flex flex-wrap gap-1.5 mb-4">
                      {[
                        { id: 'all', label: TRANSLATIONS[lang].all },
                        { id: 'baby', label: '👶' },
                        { id: 'swim', label: '🏖️' },
                        { id: 'hike', label: '🌵' },
                        { id: 'surprise', label: '🎉' }
                      ].map((cat) => (
                        <button
                          key={cat.id}
                          onClick={() => setChecklistFilter(cat.id)}
                          className={`px-2.5 py-1.5 rounded-xl text-xs font-bold transition-all ${
                            checklistFilter === cat.id
                              ? 'bg-orange-500 text-white shadow-sm'
                              : 'bg-orange-50 text-amber-800 hover:bg-orange-100/70'
                          }`}
                          title={cat.label}
                        >
                          {cat.label}
                        </button>
                      ))}
                    </div>

                    <div className="space-y-2 max-h-[300px] overflow-y-auto pr-1">
                      {filteredChecklist.length === 0 ? (
                        <p className="text-xs text-slate-400 py-4 text-center">{TRANSLATIONS[lang].no_items}</p>
                      ) : (
                        filteredChecklist.map((item) => (
                          <div 
                            key={item.id} 
                            className={`flex items-center justify-between p-2.5 rounded-xl border transition-all ${
                              item.checked 
                                ? 'bg-slate-50/70 border-slate-100 text-slate-400 line-through' 
                                : 'bg-orange-50/20 border-orange-100/50 hover:bg-orange-50/40 text-slate-700'
                            }`}
                          >
                            <label className="flex items-center gap-3 cursor-pointer flex-1 select-none">
                              <input 
                                type="checkbox" 
                                checked={item.checked}
                                onChange={() => toggleChecklist(item.id)}
                                className="rounded border-orange-300 text-orange-600 focus:ring-orange-500 h-4 w-4"
                              />
                              <span className="text-xs font-medium leading-tight">{item.text}</span>
                            </label>
                            <button 
                              onClick={() => deleteChecklistItem(item.id)}
                              className="text-slate-400 hover:text-red-500 p-1 text-sm rounded transition"
                              title="Delete"
                            >
                              ✕
                            </button>
                          </div>
                        ))
                      )}
                    </div>

                    <form onSubmit={addChecklistItem} className="mt-4 pt-4 border-t border-orange-100/70 space-y-2">
                      <div className="flex gap-1.5">
                        <input 
                          type="text" 
                          value={newChecklistItem}
                          onChange={(e) => setNewChecklistItem(e.target.value)}
                          placeholder={TRANSLATIONS[lang].add_item}
                          className="flex-1 bg-slate-50 text-slate-700 border border-orange-100/80 rounded-xl px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-orange-400"
                        />
                        <select 
                          value={newChecklistCategory}
                          onChange={(e) => setNewChecklistCategory(e.target.value)}
                          className="bg-slate-50 border border-orange-100/80 rounded-xl px-2 py-1.5 text-xs text-slate-600 focus:outline-none focus:ring-2 focus:ring-orange-400"
                        >
                          <option value="baby">👶</option>
                          <option value="swim">🏖️</option>
                          <option value="hike">🌵</option>
                          <option value="surprise">🎉</option>
                        </select>
                        <button 
                          type="submit" 
                          className="bg-orange-600 hover:bg-orange-700 text-white font-bold text-xs px-3 py-1.5 rounded-xl shadow-sm transition"
                        >
                          {TRANSLATIONS[lang].btn_add}
                        </button>
                      </div>

                      <div className="flex justify-between items-center pt-2">
                        <button 
                          type="button" 
                          onClick={resetChecklist}
                          className="text-[10px] font-bold text-orange-600/80 hover:text-orange-700 underline"
                        >
                          🔄 {TRANSLATIONS[lang].reset_list}
                        </button>
                        <span className="text-[10px] text-slate-400 font-semibold italic">
                          {unpackedCount} {TRANSLATIONS[lang].items_left}
                        </span>
                      </div>
                    </form>
                  </div>

                  <div className="bg-white rounded-3xl p-6 shadow-xl border border-orange-50">
                    <div className="flex items-center justify-between mb-2">
                      <h3 className="text-lg font-extrabold text-amber-950">
                        {TRANSLATIONS[lang].who_brings_what}
                      </h3>
                      <span className="text-xs font-bold bg-amber-100 text-amber-800 px-2.5 py-1 rounded-full">
                        {taskCompletedCount}/{taskTotalCount}
                      </span>
                    </div>
                    <p className="text-xs text-amber-900/60 mb-4">{TRANSLATIONS[lang].who_subtitle}</p>

                    <div className="space-y-3 max-h-[320px] overflow-y-auto pr-1">
                      {tasks.length === 0 ? (
                        <p className="text-xs text-slate-400 py-4 text-center">{TRANSLATIONS[lang].no_tasks}</p>
                      ) : (
                        tasks.map((task) => (
                          <div 
                            key={task.id} 
                            className={`p-3 rounded-2xl border transition-all ${
                              task.completed 
                                ? 'bg-emerald-50/40 border-emerald-100 text-slate-400' 
                                : 'bg-[#FFFDF9] border-orange-100/50 hover:bg-[#FFFBF2] text-slate-700'
                            }`}
                          >
                            <div className="flex items-start justify-between gap-2">
                              <label className="flex items-start gap-2.5 cursor-pointer flex-1 select-none">
                                <input 
                                  type="checkbox" 
                                  checked={task.completed}
                                  onChange={() => toggleTask(task.id)}
                                  className="mt-0.5 rounded border-orange-300 text-emerald-600 focus:ring-emerald-500 h-4 w-4"
                                />
                                <div className="text-xs">
                                  <p className={`font-semibold leading-tight ${task.completed ? 'line-through text-slate-400' : 'text-slate-800'}`}>
                                    {task.item}
                                  </p>
                                  <div className="flex items-center gap-1.5 mt-1">
                                    <span className="text-[10px] font-extrabold text-amber-800 bg-amber-50 px-2 py-0.5 rounded border border-amber-100/50">
                                      👤 {task.name}
                                    </span>
                                    {task.completed && (
                                      <span className="text-[9px] font-bold text-emerald-700 bg-emerald-50 px-1.5 py-0.5 rounded">
                                        {TRANSLATIONS[lang].completed}
                                      </span>
                                    )}
                                  </div>
                                </div>
                              </label>
                              <button 
                                onClick={() => deleteTask(task.id)}
                                className="text-slate-400 hover:text-red-500 text-xs p-1 rounded transition"
                              >
                                ✕
                              </button>
                            </div>
                          </div>
                        ))
                      )}
                    </div>

                    <form onSubmit={addTask} className="mt-4 pt-4 border-t border-orange-100/70 space-y-2">
                      <div className="space-y-2">
                        <input 
                          type="text" 
                          value={newTaskItem}
                          onChange={(e) => setNewTaskItem(e.target.value)}
                          placeholder={TRANSLATIONS[lang].add_task}
                          className="w-full bg-slate-50 text-slate-700 border border-orange-100/80 rounded-xl px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-orange-400"
                        />
                        <div className="flex gap-2">
                          <input 
                            type="text" 
                            value={newTaskName}
                            onChange={(e) => setNewTaskName(e.target.value)}
                            placeholder={TRANSLATIONS[lang].assignee_placeholder}
                            className="flex-1 bg-slate-50 text-slate-700 border border-orange-100/80 rounded-xl px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-orange-400"
                          />
                          <button 
                            type="submit" 
                            className="bg-amber-600 hover:bg-amber-700 text-white font-bold text-xs px-4 py-1.5 rounded-xl shadow-sm transition"
                          >
                            {TRANSLATIONS[lang].btn_add}
                          </button>
                        </div>
                      </div>

                      <div className="pt-2 text-right">
                        <button 
                          type="button" 
                          onClick={resetTasks}
                          className="text-[10px] font-bold text-amber-700/80 hover:text-amber-800 underline"
                        >
                          🔄 {lang === 'HE' ? 'איפוס משימות' : 'Reset Task Allocations'}
                        </button>
                      </div>
                    </form>

                  </div>

                </div>

              </main>

              <footer className="bg-amber-950 text-amber-200/70 py-10 px-4 mt-12 text-center border-t border-amber-900">
                <div className="max-w-2xl mx-auto space-y-2">
                  <p className="font-extrabold tracking-widest text-white text-sm">
                    ⛰️ SURPRISE CAMP SAHARA 2026 🌌
                  </p>
                  <p className="text-xs">
                    Famille Unie, Souvenirs Éternels • Family Teamwork is Dreamwork
                  </p>
                  <div className="text-[10px] text-amber-400/50 mt-4">
                    Designed for Papa's 60th Surprise Celebration in the Judean Desert & Dead Sea Oasis.
                  </div>
                </div>
              </footer>

            </div>
          );
        }

        // Render the application into root element
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
